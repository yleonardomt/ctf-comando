<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comando - Gestor de Documentos</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

        :root {
            --theme-color: #ffcc00;
            --theme-color-glow: rgba(255, 204, 0, 0.4);
            --theme-color-dim: rgba(255, 204, 0, 0.1);
            --neon-pink: #ff003c;
            --dark-bg: #03060a;
            --panel-bg: rgba(3, 8, 16, 0.7);
            --text-main: #e0e6ed;
            --terminal-green: #0f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--dark-bg);
            background-image: linear-gradient(var(--theme-color-dim) 1px, transparent 1px),
                              linear-gradient(90deg, var(--theme-color-dim) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text-main);
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        body::after {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%),
                        linear-gradient(90deg, rgba(255,0,0,0.06), rgba(0,255,0,0.02), rgba(0,0,255,0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 2;
        }

        .container { width: 90%; max-width: 750px; position: relative; z-index: 10; animation: bootUp 0.8s ease-out; }
        @keyframes bootUp { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }

        .glitch {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            color: #fff;
            text-shadow: 0 0 20px var(--theme-color-glow);
            margin-bottom: 1.5rem;
            position: relative;
        }

        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--dark-bg);
        }
        .glitch::before { left: 2px; text-shadow: -2px 0 var(--neon-pink); animation: glitch 3s infinite; }
        .glitch::after { left: -2px; text-shadow: -2px 0 var(--theme-color); animation: glitch 2.5s infinite; }
        @keyframes glitch { 0% { clip: rect(10px, 9999px, 31px, 0); } 100% { clip: rect(15px, 9999px, 90px, 0); } }

        .card {
            background: var(--panel-bg);
            border: 1px solid var(--theme-color-glow);
            border-top: 4px solid var(--theme-color);
            padding: 2rem;
            backdrop-filter: blur(15px);
            transition: all 0.3s;
        }
        .card:hover { box-shadow: 0 0 40px var(--theme-color-dim); border-color: var(--theme-color); }

        .badge-container { position: absolute; top: -12px; right: 20px; display: flex; gap: 8px; }
        .badge {
            background: var(--dark-bg);
            color: var(--theme-color);
            border: 1px solid var(--theme-color);
            padding: 3px 12px;
            font-size: 0.7rem;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
        }

        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.3rem; margin-bottom: 0.5rem; letter-spacing: 2px; display: flex; align-items: center; gap: 10px; }
        h1::before { content: ''; width: 10px; height: 10px; background: var(--theme-color); box-shadow: 0 0 8px var(--theme-color); }

        .terminal-box {
            background: #020408;
            border-left: 3px solid var(--terminal-green);
            padding: 0.8rem;
            margin: 1rem 0;
            color: var(--terminal-green);
            font-size: 0.8rem;
        }
        .cursor { display: inline-block; width: 8px; height: 1rem; background: var(--terminal-green); animation: blink 1s step-end infinite; vertical-align: bottom; }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

        .controls { display: flex; gap: 1rem; margin: 1.5rem 0; flex-wrap: wrap; }
        .cyber-link {
            background: var(--theme-color-dim);
            color: var(--theme-color);
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            padding: 0.7rem 1.5rem;
            border: 1px solid var(--theme-color);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.75rem;
            transition: 0.3s;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            display: inline-block;
        }
        .cyber-link:hover { background: var(--theme-color); color: var(--dark-bg); box-shadow: 0 0 15px var(--theme-color); transform: translateY(-2px); }

        .file-viewer {
            background: #020408;
            border: 1px solid #1f2937;
            border-left: 3px solid var(--theme-color);
            padding: 1.2rem;
            margin-top: 1rem;
            min-height: 200px;
        }
        .current-doc { color: var(--theme-color); font-size: 0.8rem; margin-bottom: 0.5rem; }
        .file-content { color: #aebfd1; font-size: 0.85rem; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }

        .footer { text-align: right; font-size: 0.6rem; color: #4a6a4a; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid rgba(255,204,0,0.2); }
        hr { border-color: #1f2937; margin: 0.5rem 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="glitch" data-text="GESTOR TÁCTICO">GESTOR TÁCTICO</div>
        <div class="card">
            <div class="badge-container">
                <div class="badge">RETO 5</div>
                <div class="badge">PATH TRAVERSAL</div>
            </div>
            <h1>SISTEMA DE ARCHIVOS CLASIFICADOS</h1>

            <div class="terminal-box">
                <p>$ Nivel de Autorización: VISOR ESTÁNDAR<span class="cursor"></span></p>
            </div>

            <div class="controls">
                <a href="?doc=reporte_01.txt" class="cyber-link">[CARGAR REPORTE 01]</a>
                <a href="?doc=inventario.txt" class="cyber-link">[CARGAR INVENTARIO]</a>
            </div>

            <div class="file-viewer">
                <div class="current-doc">📄 Leyendo documento: {{ doc_name }}</div>
                <hr>
                <div class="file-content">{{ contenido|safe }}</div>
            </div>

            <div class="footer">COMANDO TÁCTICO • UNIDAD CIBERNÉTICA • RETO 5</div>
        </div>
    </div>
</body>
</html>
